version: '3.8'

services:
  postgres_db:
    image: postgres:15
    container_name: petstore_db
    restart: always
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: uit
      POSTGRES_DB: petstore
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata: